<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edgar Moe Htut</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    min-height: 100vh;
    padding: 60px 40px 40px;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
  }

  /* HEADER */
  header {
    margin-bottom: 48px;
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    color: #ffffff;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 14px;
    color: #888;
  }

  /* SECTION */
  .section-title {
    font-size: 18px;
    font-weight: 600;
    color: #ffffff;
    margin-bottom: 20px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 60px;
  }

  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 24px 20px;
    min-height: 110px;
    display: flex;
    align-items: flex-start;

    transition: border-color 0.2s, background 0.2s;
  }

  .card:hover {
    background: #1f1f1f;
    border-color: #ffffff;
    cursor: pointer;
  }

  .card-name {
    font-size: 15px;
    font-weight: 500;
    color: #e8e8e8;
    line-height: 1.4;
  }

  /* FOOTER */
  footer {
    font-size: 13px;
    color: #555;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  footer a {
    color: #888;
    text-decoration: none;
    transition: color 0.2s;
  }

  footer a:hover { color: #ccc; }

  footer .dot { color: #333; }

  @media (max-width: 500px) {
    body { padding: 40px 20px 30px; }
    .grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Edgar Moe Htut</h1>
    <p class="subtitle">Portfolio</p>
  </header>

  <section>
    <p class="section-title">Projects</p>
    <div class="grid">
      <div class="card">
        <span class="card-name">Rule-based chatbot for Dota 2</span>
      </div>
      <div class="card">
        <span class="card-name">Restaurant Management and Booking System</span>
      </div>
      <div class="card">
        <span class="card-name">Email Spam Classification</span>
      </div>
      <div class="card">
        <span class="card-name">C++ Asteroids game</span>
      </div>
    </div>
  </section>

  <footer>
    <span>© 2026 Edgar Moe Htut</span>
    <span class="dot">•</span>
    <a href="https://github.com/Edgar427" target="_blank">GitHub</a>
  </footer>

</div>
</body>
</html>
